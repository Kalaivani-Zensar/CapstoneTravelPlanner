<div class="trips-header">
  <h2 class="title" color="primary">My Trips</h2>
</div>
<div class="card-container">
  @for (trip of trips; track trip.id) {
<mat-card class="trip-card" appearance="outlined">
  <mat-card-header class="card-header">
  <div class="header-text">
      <mat-card-title>{{ trip.destination }}</mat-card-title>
      <mat-card-subtitle>
        {{ trip.startDate | date }} - {{ trip.endDate | date }}
      </mat-card-subtitle>
    </div>
  <div class="action-icons">
    <button mat-icon-button color="primary" (click)="editTrip(trip.id)">
      <mat-icon>edit</mat-icon>
    </button>
    <button mat-icon-button color="warn" (click)="deleteTrip(trip.id)">
      <mat-icon>delete</mat-icon>
    </button>
  </div>
</mat-card-header>
 <img mat-card-image class="card-image" src="https://static.india.com/wp-content/uploads/2022/12/travel-trends.jpg"/>
    <mat-card-actions class="card-actions">
      <button mat-raised-button color="primary" (click)="manageExpense(trip.id)">Manage Expense</button>
      <button mat-stroked-button color="primary" (click)="viewItinerary(trip.id)">View Itinerary</button>
    </mat-card-actions>
  </mat-card>
  }
</div>
